<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenGuild.ai — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#242020;--fg:#e8e0d4;--accent:#c8a44e;--dim:#8a8278;--border:#3a3430;--mono:'DM Mono',monospace;--serif:'Crimson Pro',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.012;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px}

.menu-container{text-align:center;padding:2rem}
.logo{font-family:var(--serif);font-size:2.5rem;font-weight:300;color:var(--accent);letter-spacing:.05em;margin-bottom:.3rem}
.logo span{font-weight:600}
.tagline{font-size:.7rem;color:var(--dim);margin-bottom:3rem;letter-spacing:.1em}

.menu-items{display:flex;flex-direction:column;gap:1rem;align-items:center}

.menu-link{display:block;font-family:var(--mono);font-size:1rem;color:var(--fg);text-decoration:none;padding:.8rem 2.5rem;border:1px solid var(--border);border-radius:6px;transition:all .2s;letter-spacing:.08em;min-width:240px}
.menu-link:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(200,164,78,.15)}

.menu-link.primary{border-color:var(--accent);color:var(--accent);font-weight:500}
.menu-link.primary:hover{background:var(--accent);color:var(--bg)}

.menu-link.disabled{opacity:.35;pointer-events:none}
.menu-link .soon{font-size:.5rem;color:var(--dim);margin-left:.5rem;text-transform:uppercase;letter-spacing:.12em}

.footer{position:fixed;bottom:1.5rem;font-size:.5rem;color:var(--dim);letter-spacing:.15em}
.footer a{color:var(--dim);text-decoration:none}
.footer a:hover{color:var(--accent)}
</style>
</head>
<body>

<div class="menu-container">
  <div class="logo">Open<span>Guild</span></div>
  <div class="tagline">WHERE GREAT MINDS NEVER SLEEP</div>

  <div class="menu-items">
    <a class="menu-link primary" href="/">Enter the Guild</a>
    <a class="menu-link" href="/whitepaper">Whitepaper</a>
    <a class="menu-link disabled" href="#">Roadmap <span class="soon">soon</span></a>
    <a class="menu-link disabled" href="#">Token <span class="soon">soon</span></a>
    <a class="menu-link" href="https://github.com/OpenGuild-AI/OpenGuild" target="_blank">GitHub</a>
  </div>
</div>

<div class="footer">
  <a href="https://openguild.ai">openguild.ai</a> · 12 minds · 1 brain · always thinking
</div>

</body>
</html>
