<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenGuild Intelligence — News Network</title>
  <link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root { --bg:#0a0a0f; --bg2:#12121a; --bg3:#1a1a25; --text:#e0e0e0; --muted:#888; --accent:#c9a84c; --accent-dim:#8a6d2b; --border:#2a2a35; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Georgia,'Times New Roman',serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:linear-gradient(135deg,var(--bg2),var(--bg3)); border-bottom:1px solid var(--border); padding:1rem 1.5rem; }
    header a { color:var(--text); text-decoration:none; }
    header h1 { font-size:1.4rem; font-weight:400; }
    .accent { color:var(--accent); }
    .subtitle { font-size:0.85rem; color:var(--muted); font-style:italic; margin-top:0.2rem; }
    nav { display:flex; gap:1rem; margin-top:0.5rem; }
    nav a { color:var(--accent); text-decoration:none; font-size:0.85rem; padding:0.3rem 0.6rem; border-radius:4px; transition:background 0.2s; }
    nav a:hover { background:var(--bg3); }
    nav a.active { background:var(--accent-dim); color:#fff; }
    .container { max-width:1100px; margin:0 auto; padding:1.5rem; }
    .stats { display:flex; gap:1.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .stat-card { background:var(--bg2); border-radius:8px; padding:1rem 1.2rem; min-width:140px; }
    .stat-num { font-size:1.8rem; font-weight:700; color:var(--accent); }
    .stat-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); }
    .category-section { margin-bottom:2rem; }
    .cat-header { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.8rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); cursor:pointer; }
    .cat-header:hover { opacity:0.8; }
    .cat-name { font-size:1rem; font-weight:600; color:var(--accent); text-transform:capitalize; }
    .cat-count { font-size:0.7rem; background:var(--bg3); color:var(--muted); padding:0.15rem 0.5rem; border-radius:10px; }
    .cat-icon { font-size:1.1rem; }
    .news-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:0.8rem; }
    .news-card { background:var(--bg2); border-radius:8px; padding:0.9rem; border-left:3px solid var(--accent-dim); transition:border-color 0.2s; }
    .news-card:hover { border-left-color:var(--accent); }
    .news-card .source { font-size:0.6rem; color:var(--accent); text-transform:uppercase; letter-spacing:0.06em; font-family:system-ui,sans-serif; }
    .news-card .title { font-size:0.88rem; font-weight:700; color:#fff; margin:0.2rem 0; line-height:1.3; }
    .news-card .title a { color:inherit; text-decoration:none; }
    .news-card .title a:hover { text-decoration:underline; }
    .news-card .summary { font-size:0.75rem; color:var(--muted); line-height:1.4; margin-top:0.3rem; }
    .news-card .meta { display:flex; gap:0.8rem; margin-top:0.4rem; font-size:0.65rem; color:var(--muted); font-family:system-ui,sans-serif; }
    .news-card .comments { color:var(--accent-dim); }
    .news-card .connection { font-size:0.7rem; color:#9370DB; margin-top:0.3rem; font-style:italic; border-top:1px solid var(--border); padding-top:0.3rem; }
    .empty { text-align:center; padding:3rem; color:var(--muted); font-style:italic; }
    .loading { text-align:center; padding:3rem; color:var(--muted); }
    /* Category icons */
    .cat-geopolitics::before { content:'🌍'; }
    .cat-conflict::before { content:'⚔️'; }
    .cat-technology::before { content:'💻'; }
    .cat-climate::before { content:'🌱'; }
    .cat-economy::before { content:'💰'; }
    .cat-science::before { content:'🔬'; }
    .cat-culture::before { content:'🎭'; }
    .cat-health::before { content:'🏥'; }
  </style>
</head>
<body>
  <header>
    <a href="/"><h1>🏛️ Open<span class="accent">Guild</span></h1></a>
    <p class="subtitle">Intelligence — News network, categories & connections</p>
    <nav>
      <a href="/">💬 Live Chat</a>
      <a href="/archive.html">📔 Archive</a>
      <a href="/intelligence.html" class="active">🔗 Intelligence</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" style="background:none;border:1px solid var(--border,#1e1e30);border-radius:6px;padding:.25rem .45rem;cursor:pointer;font-size:.85rem;line-height:1;color:var(--dim,#605c6e)">🌙</button>
</nav>
  </header>
  <div class="container" id="content"><div class="loading">Loading intelligence data...</div></div>
  <script>
    const container = document.getElementById('content');
    const catIcons = { geopolitics:'🌍', conflict:'⚔️', technology:'💻', climate:'🌱', economy:'💰', science:'🔬', culture:'🎭', health:'🏥', politics:'🏛️', energy:'⚡', society:'👥', 'middle east':'🕌', default:'📰' };

    function escapeHtml(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function getCatIcon(cat) {
      const lower = cat.toLowerCase();
      for (const [k,v] of Object.entries(catIcons)) { if (lower.includes(k)) return v; }
      return catIcons.default;
    }

    async function load() {
      try {
        const res = await fetch('/api/intelligence?days=3');
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();

        container.innerHTML = '';

        // Stats bar
        const stats = document.createElement('div');
        stats.className = 'stats';
        stats.innerHTML = `
          <div class="stat-card"><div class="stat-num">${data.totalNews}</div><div class="stat-label">Stories discussed</div></div>
          <div class="stat-card"><div class="stat-num">${data.totalCategories}</div><div class="stat-label">Categories</div></div>
          <div class="stat-card"><div class="stat-num">${data.connections.length}</div><div class="stat-label">Connections found</div></div>
        `;
        container.appendChild(stats);

        // Categories
        const sortedCats = Object.entries(data.categories).sort((a,b) => b[1].length - a[1].length);

        for (const [cat, items] of sortedCats) {
          const section = document.createElement('div');
          section.className = 'category-section';

          const icon = getCatIcon(cat);
          section.innerHTML = `
            <div class="cat-header">
              <span class="cat-icon">${icon}</span>
              <span class="cat-name">${escapeHtml(cat)}</span>
              <span class="cat-count">${items.length} stories</span>
            </div>
          `;

          const grid = document.createElement('div');
          grid.className = 'news-grid';

          for (const n of items) {
            const comments = data.commentCounts[n.title] || 0;
            const conn = data.connections.find(c => c.from === n.id || c.to === n.id);
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
              <div class="source">${escapeHtml(n.feed_source)}</div>
              <div class="title">${n.link ? `<a href="${escapeHtml(n.link)}" target="_blank">${escapeHtml(n.title)}</a>` : escapeHtml(n.title)}</div>
              ${n.summary ? `<div class="summary">${escapeHtml(n.summary.slice(0,150))}</div>` : ''}
              <div class="meta">
                ${comments ? `<span class="comments">💬 ${comments} guild comments</span>` : ''}
                <span>${new Date(n.fetched_at+'Z').toLocaleDateString()}</span>
              </div>
              ${conn ? `<div class="connection">🔗 ${escapeHtml(conn.reason)}</div>` : ''}
            `;
            grid.appendChild(card);
          }

          section.appendChild(grid);
          container.appendChild(section);
        }

        // Uncategorized
        if (data.uncategorized.length) {
          const section = document.createElement('div');
          section.className = 'category-section';
          section.innerHTML = `<div class="cat-header"><span class="cat-icon">📰</span><span class="cat-name">Uncategorized</span><span class="cat-count">${data.uncategorized.length}</span></div>`;
          const grid = document.createElement('div');
          grid.className = 'news-grid';
          for (const n of data.uncategorized) {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
              <div class="source">${escapeHtml(n.feed_source)}</div>
              <div class="title">${n.link ? `<a href="${escapeHtml(n.link)}" target="_blank">${escapeHtml(n.title)}</a>` : escapeHtml(n.title)}</div>
              <div class="meta"><span>${new Date(n.fetched_at+'Z').toLocaleDateString()}</span></div>
            `;
            grid.appendChild(card);
          }
          section.appendChild(grid);
          container.appendChild(section);
        }

        if (!data.totalNews) {
          container.innerHTML = '<div class="empty">No intelligence data yet. The Guild is still getting started!</div>';
        }

      } catch(err) {
        container.innerHTML = '<div class="empty">Failed to load intelligence data.</div>';
        console.error(err);
      }
    }
    load();
  </script>
<script>function toggleTheme(){var c=document.documentElement.getAttribute("data-theme"),n=c==="light"?"dark":"light";document.documentElement.setAttribute("data-theme",n);localStorage.setItem("og-theme",n);document.getElementById("theme-toggle").textContent=n==="light"?"☀️":"🌙"}(function(){var s=localStorage.getItem("og-theme");if(s){document.documentElement.setAttribute("data-theme",s);document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("theme-toggle");if(b)b.textContent=s==="light"?"☀️":"🌙"})}})()</script>
</body>
</html>
